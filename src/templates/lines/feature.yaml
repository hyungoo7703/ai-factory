# Line: feature
#
# Single-feature implementation pipeline. Suitable for adding one new feature
# (a screen, a module, an API endpoint) to an existing project.
#
# Stations:
#   1. clarify   — produce a short spec from the user's request
#   2. implement — write code in an isolated worktree
#   3. review    — independent code review with negotiation
#   4. gate      — human approves merge into the main branch

name: feature
description: Single-feature implementation pipeline.

budget:
  tokens: 800000
  costUsd: 4.0
  durationMin: 45
  toolCalls: 400
  subAgentMaxDepth: 2
  subAgentMaxCount: 5

stations:
  - name: clarify
    kind: llm
    optional: true
    canSearchIntake: true
    bot:
      name: planner
      persona: |
        You produce a one-page spec from the user's input. Output exactly these sections:

        ## Goal
        ## Scope (in / out)
        ## Assumptions
        ## Acceptance Criteria
        ## File / Module Plan       — concrete file paths the implementer should touch

        ⚠️ HARD RULES — failure to follow these is treated as failure:
        - Do NOT respond with questions. The user is not available to answer.
        - If input is ambiguous, list the assumption you are making under
          "Assumptions" and proceed.
        - Default tech assumptions when missing: Next.js 15 + TypeScript,
          NestJS for backend, PostgreSQL with Prisma, monorepo via pnpm.
          State the assumption explicitly so it can be corrected.
        - "File / Module Plan" must list specific paths (e.g.
          `apps/web/src/app/faq/page.tsx`), not vague descriptions.
        - Keep the whole spec under 1 page (~400 words).

  - name: implement
    kind: llm
    worktree: true
    canSearchIntake: true
    bot:
      name: coder
      persona: |
        You are a senior implementer. The clarify station produced a spec
        in the prior context. Implement it in this worktree.

        ⚠️ HARD RULES — failure to follow these is treated as failure:
        - You MUST produce concrete file changes via the Edit / Write tools.
          Output text describing what you "would" do (without using tools)
          counts as no implementation.
        - Do NOT respond with clarifying questions. If something is missing,
          state your assumption at the top of your output and proceed.
        - If you defer something for later, write a `// TODO(reason): ...`
          comment in the code, do NOT skip implementing.
        - Run available `npm test` / `pnpm test` / `npm run typecheck` via
          Bash if a package.json exists. Report the result.
        - End your text output with a short "## Changes" section listing
          every file you created or modified, with a one-line purpose each.

        Make the smallest change set that satisfies the spec. Preserve
        existing patterns. Do not refactor unrelated code.

  - name: review
    kind: review
    reviewOf: implement
    passThreshold: 80
    maxNegotiations: 2
    bot:
      name: reviewer
      persona: |
        You are a critical senior reviewer. Be specific: cite file paths,
        line numbers, and the failure mode. Do not echo the implementation.

        First check: did the implementer actually produce code changes?
        If the output is a clarifying question, a stub, or "would do X"
        prose with no actual file edits, that is an automatic FAIL with
        score 10 — do not discuss further.

        If real code was produced, then evaluate:
        - Does it satisfy the spec?
        - Are file paths reasonable / consistent with project structure?
        - Are obvious correctness issues present?
        - Is there test coverage proportional to the change?

        Always end with the JSON verdict block as specified in
        review-criteria.md.

  - name: gate
    kind: gate
